<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Fingerprint Liveness Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1c20, #2c2f36);
      color: white;
      min-height: 100vh;
    }
    .navbar {
      margin-bottom: 30px;
    }
    .card {
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0px 4px 20px rgba(0,0,0,0.5);
    }
    .btn-success {
      font-weight: bold;
    }
    .form-control {
      border-radius: 10px;
    }
    h2 {
      font-weight: bold;
      color: #00e6ac;
    }
    .navbar-brand {
      color: #00e6ac !important;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">🔒 Fingerprint Liveness Detection</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Detection</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('charts') }}">Analytics</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('performance') }}">Performance</a></li>
          {% if 'user' in session %}
            <li class="nav-item"><a class="btn btn-danger ms-2" href="{{ url_for('logout') }}">Logout</a></li>
          {% else %}
            <li class="nav-item"><a class="btn btn-outline-light ms-2" href="{{ url_for('login') }}">Login</a></li>
            <li class="nav-item"><a class="btn btn-success ms-2" href="{{ url_for('register') }}">Register</a></li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <!-- REGISTER FORM -->
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4">
          <h2 class="text-center mb-4">🧬 Create Your Biometric Account</h2>
          <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-success">Register</button>
            </div>
          </form>
          <p class="mt-3 text-center">
            Already have an account? 
            <a href="{{ url_for('login') }}" class="text-success fw-bold">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
