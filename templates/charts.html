<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analytics - Fingerprint Liveness Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #1a1c1f;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }
    .navbar { background: #000; }
    .navbar-brand { color: #00e6ac !important; font-weight: bold; }
    h2, h4 { color: #00e6ac; }

    .chart-card {
      background: linear-gradient(145deg, #2a2d30, #1b1d20);
      border: 2px solid #00e6ac;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.7), inset 0px 0px 10px rgba(0,230,172,0.3);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .chart-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0px 15px 35px rgba(0,0,0,0.9), 0px 0px 25px rgba(0,230,172,0.6);
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('home') }}">🔒 Fingerprint Liveness Detection</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('index') }}">Detection</a></li>
        <li class="nav-item"><a class="nav-link text-white active" href="{{ url_for('charts') }}">Analytics</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('performance') }}">Performance</a></li>
        <li class="nav-item"><a class="btn btn-danger ms-2" href="{{ url_for('logout') }}">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- CHARTS SECTION -->
  <div class="container mt-5">
    <h2 class="text-center mb-4">📊 Liveness Detection Analytics</h2>
    <div class="row text-center">
      <div class="col-md-6 mb-4">
        <div class="chart-card">
          <h4>Dataset Distribution</h4>
          <canvas id="datasetChart"></canvas>
        </div>
      </div>
      <div class="col-md-6 mb-4">
        <div class="chart-card">
          <h4>Model Accuracy Over Epochs</h4>
          <canvas id="accuracyChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Dataset Distribution Chart (Only Real vs Fake)
    const ctx1 = document.getElementById('datasetChart');
    new Chart(ctx1, {
      type: 'pie',
      data: {
        labels: ['Real', 'Fake'],
        datasets: [{
          data: [55, 45],
          backgroundColor: ['#00e6ac', '#ff0066']
        }]
      },
      options: { plugins: { legend: { labels: { color: 'white' } } } }
    });

    // Accuracy Progress Chart
    const ctx2 = document.getElementById('accuracyChart');
    new Chart(ctx2, {
      type: 'line',
      data: {
        labels: ['Epoch 1', 'Epoch 2', 'Epoch 3', 'Epoch 4', 'Epoch 5', 'Epoch 6'],
        datasets: [{
          label: 'Accuracy',
          data: [70, 78, 83, 88, 91, 95],
          borderColor: '#00e6ac',
          fill: true,
          tension: 0.3,
          backgroundColor: 'rgba(0,230,172,0.2)'
        }]
      },
      options: {
        scales: {
          x: { ticks: { color: 'white' } },
          y: { ticks: { color: 'white' }, beginAtZero: true }
        },
        plugins: { legend: { labels: { color: 'white' } } }
      }
    });
  </script>
</body>
</html>
