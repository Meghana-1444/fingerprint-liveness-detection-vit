<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Fingerprint Liveness Detection</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { background: #1c1c1c; color: white; }
    .navbar { background: #000; }
    .navbar-brand { color: #00e6ac !important; font-weight: bold; }
    .card-fingerprint { background: #2b2b2b; border: 3px solid #00e6ac; }
    a { text-decoration: none; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('home') }}">🔒 Fingerprint Liveness Detection</a>
    </div>
  </nav>

  <!-- Login -->
  <div class="container mt-5">
    <div class="col-md-4 mx-auto card-fingerprint p-4 rounded shadow">
      <h3 class="text-center mb-3">🧠 Secure Login</h3>
      <p class="text-center text-secondary mb-4">Access your biometric analysis dashboard</p>
      <form method="POST">
        <div class="mb-3">
          <label>Username</label>
          <input type="text" class="form-control" name="username" required placeholder="Enter your username">
        </div>
        <div class="mb-3">
          <label>Password</label>
          <input type="password" class="form-control" name="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-success w-100 fw-bold">Login</button>
      </form>
      <p class="text-center mt-3">
        Don’t have an account? 
        <a href="{{ url_for('register') }}" class="text-success fw-bold">Register</a>
      </p>
    </div>
  </div>
</body>
</html>
