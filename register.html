<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Performance - Fingerprint Liveness Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #1a1c1f;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }
    .navbar { background: #000; }
    .navbar-brand { color: #00e6ac !important; font-weight: bold; }
    h2, h4 { color: #00e6ac; }

    /* 3D Card Effect */
    .card {
      background: linear-gradient(145deg, #2a2d30, #1b1d20);
      border: 2px solid #00e6ac;
      border-radius: 15px;
      padding: 20px;
      color: white;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.7), inset 0px 0px 10px rgba(0,230,172,0.3);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0px 15px 35px rgba(0,0,0,0.9), 0px 0px 25px rgba(0,230,172,0.6);
    }

    /* Table */
    .table {
      color: white;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
    }
    thead {
      background: linear-gradient(90deg, #00e6ac, #009966);
      color: black;
      font-weight: bold;
    }
    tbody tr:hover {
      background: rgba(0,230,172,0.15);
      transform: scale(1.01);
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('home') }}">🔒 Fingerprint Liveness Detection</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('index') }}">Detection</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('charts') }}">Analytics</a></li>
        <li class="nav-item"><a class="nav-link text-white active" href="{{ url_for('performance') }}">Performance</a></li>
        <li class="nav-item"><a class="btn btn-danger ms-2" href="{{ url_for('logout') }}">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- PERFORMANCE SECTION -->
  <div class="container mt-5">
    <h2 class="text-center mb-4">📈 Model Performance Metrics</h2>

    <!-- Overall Metrics -->
    <div class="row text-center mb-5">
      <div class="col-md-3 mb-3"><div class="card"><h4>Accuracy</h4><p>95.4%</p></div></div>
      <div class="col-md-3 mb-3"><div class="card"><h4>Precision</h4><p>93.6%</p></div></div>
      <div class="col-md-3 mb-3"><div class="card"><h4>Recall</h4><p>94.8%</p></div></div>
      <div class="col-md-3 mb-3"><div class="card"><h4>F1-Score</h4><p>94.2%</p></div></div>
    </div>

    <!-- Per-Class Performance -->
    <div class="chart-card">
      <h4 class="mb-3 text-center">🧬 Per-Class Evaluation</h4>
      <table class="table table-hover text-center align-middle">
        <thead>
          <tr>
            <th>Class</th>
            <th>Precision</th>
            <th>Recall</th>
            <th>F1-Score</th>
            <th>Support</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="badge bg-success">Real</span></td>
            <td>0.96</td>
            <td>0.95</td>
            <td>0.95</td>
            <td>580</td>
          </tr>
          <tr>
            <td><span class="badge bg-danger">Fake</span></td>
            <td>0.92</td>
            <td>0.94</td>
            <td>0.93</td>
            <td>420</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
